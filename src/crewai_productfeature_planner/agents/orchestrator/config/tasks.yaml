publish_to_confluence_task:
  description: >
    A completed PRD markdown document is available for publishing.

    ## PRD Content
    {prd_content}

    ## Instructions
    Publish this PRD to the Atlassian Confluence project space using
    the confluence_publisher tool.

    Use the following title for the page:
      "{page_title}"

    The run_id for tracking is: {run_id}

    If the page already exists, it will be updated with the latest content.
    If it does not exist, a new page will be created.
  expected_output: >
    Confirmation that the PRD was published to Confluence, including
    the page ID and URL.  If the publish failed, include the error
    details.

create_jira_epic_task:
  description: >
    Create a Jira Epic to track the implementation of a newly published
    PRD.

    ## PRD Title
    {page_title}

    ## Executive Summary
    {executive_summary}

    ## Confluence Page
    {confluence_url}

    ## Instructions
    Create a Jira Epic using the jira_create_issue tool with:
    - Summary: "{page_title}"
    - Issue type: "Epic"
    - Description: The executive summary content above.  The Confluence
      page link will be automatically appended.
    - Labels: "prd,auto-generated"
    - Run ID: {run_id}
    - Confluence URL: "{confluence_url}"

    This Epic will serve as the parent for all Stories and Tasks
    derived from the PRD requirements.
  expected_output: >
    The Jira Epic key and URL confirming successful creation.
    If creation failed, include the error details.

create_jira_stories_task:
  description: >
    Create Jira Story tickets for each functional requirement, organised
    by role (UX, Engineering, QE).  Each Story represents a work stream
    for a specific discipline under the parent Epic.

    **IMPORTANT — Agent-Ready Stories**: Every Story description you
    create must be detailed enough that an AI coding agent (e.g. Codex,
    Copilot) or a vibe-coding session can pick up the ticket and start
    working immediately without asking for clarification.

    ## PRD Functional Requirements
    {functional_requirements}

    {additional_prd_context}

    ## Parent Epic
    {epic_key}

    ## Confluence Page
    {confluence_url}

    ## Instructions

    Analyse the functional requirements and the additional PRD context
    above (non-functional requirements, edge cases, error handling,
    user personas, dependencies) and create **one Story per
    role per major requirement area**.  Use the following four roles
    and create them **in the order listed** — UX first, then
    Architecture, then Engineering, then QE:

    ### 1. UX Stories (create these FIRST)
    UX stories must be completed before any other work can begin.
    Each UX story should produce concrete design deliverables:
    - Detailed **wireframes** for every screen / interaction flow
    - High-fidelity **design mockups** and a clickable **prototype**
    - Component specifications and design-system tokens
    - Interaction states (loading, error, empty, success)
    - Accessibility annotations (contrast, focus order, ARIA)
    - **Sample data**: Provide representative sample content for every
      screen (e.g. placeholder text, sample images, mock user data)
    Component: "UX"

    ### 2. Architecture Stories (depend on UX)
    Architecture stories define the **data definitions** that both
    Backend and Frontend engineering depend on.  Each Architecture
    story **is blocked by** the corresponding UX story — set
    ``is_blocked_by_key`` to the UX story key.
    Architecture stories cover:
    - **MongoDB data schema** — define new collections, document
      structures, indexes, and validation rules for every entity
      the feature introduces.  If no existing schema fits, design
      a new collection and document format.  Include **sample
      documents** (2-3 realistic JSON examples per collection).
    - **API contract definition** — specify every REST / GraphQL
      endpoint (path, method, query parameters, request body,
      success response, error responses with status codes and
      messages).  Include **sample request/response JSON** for
      each endpoint.
    - **Algorithm selection** — when business logic involves
      non-trivial processing (search ranking, recommendation,
      matching, scheduling, etc.), specify the algorithm or
      approach with reasoning for why it was chosen over
      alternatives.
    All definitions must be documented in Confluence so Backend and
    Frontend engineers can reference them during implementation.
    Component: "Architecture"

    ### 3. Engineering Stories (depend on UX and Architecture)
    Engineering stories describe the full-stack implementation work
    that is derived from the UX designs and Architecture data
    definitions.  Each Engineering story **is blocked by** the
    corresponding Architecture story — set ``is_blocked_by_key``
    to the Architecture story key (which itself depends on UX).
    Each Engineering story description must include:
    - Summary of the backend services and frontend components to build
    - Reference to the Architecture story for schema and API specs
    - Acceptance criteria written as testable assertions
    - **Guard rails**: explicit constraints on what NOT to do
      (e.g. "Do NOT modify existing auth middleware", "Do NOT add
      new npm dependencies without approval")
    Component: "Engineering"

    ### 4. QE Stories (depend on UX)
    QE stories cover comprehensive test coverage for every Engineering
    task to verify that each user story and the overall Epic are fully
    satisfied.  Each QE story **is blocked by** the corresponding
    UX story — set ``is_blocked_by_key`` to the UX story key.
    Each QE story description must include:
    - **Happy-path test scenarios** with sample input and expected
      output
    - **Edge-case test scenarios** listing boundary conditions,
      empty inputs, maximum-length inputs, concurrent operations
    - **Negative test scenarios** listing invalid inputs, auth
      failures, missing data, and expected error responses
    - **Sample test data fixtures** — concrete JSON or Python dicts
      that the QA agent can use directly in test setup
    Component: "QE"

    For each Story, call the jira_create_issue tool with:
    - Issue type: "Story"
    - Summary: A concise title prefixed with the role, e.g.
      "[UX] Design onboarding flow" or
      "[Architecture] Data definitions for onboarding" or
      "[Engineering] Implement onboarding backend & frontend" or
      "[QE] Unit tests for onboarding"
    - Description: Detailed acceptance criteria and scope for this role.
      UX stories must specify wireframe and design deliverables with
      sample content.
      Architecture stories must list every collection, document schema,
      API contract, and algorithm decision with sample data.
      Engineering stories must describe frontend and backend scope with
      guard rails.
      QE stories must describe test coverage with happy-path, edge-case
      and negative scenarios plus sample test data.
    - Epic key: "{epic_key}"
    - Labels: "prd,auto-generated"
    - Run ID: {run_id}
    - Confluence URL: "{confluence_url}"
    - Component: The role name ("UX", "Architecture", "Engineering",
      or "QE")
    - is_blocked_by_key: For Architecture stories, set this to the
      corresponding UX story key.  For Engineering stories, set this
      to the corresponding Architecture story key.  For QE stories,
      set this to the corresponding UX story key.

    ### Dependency summary
    UX stories have **no blockers** — they are the starting point.
    Architecture stories are **blocked by** the matching UX story.
    Engineering stories are **blocked by** the matching Architecture story.
    QE stories are **blocked by** the matching UX story.

    Keep each Story small enough to be estimated and completed in one
    sprint.

    **IMPORTANT**: Record every Story key you create — you will need them
    for the next step where sub-tasks are created.
  expected_output: >
    A structured list of all Jira Story keys created, grouped by role,
    with their URLs.  Format each as:
      [ROLE] STORY_KEY: Summary — URL
    followed by a summary of dependency links created.
    If any creation failed, include the error details.

create_jira_tasks_task:
  description: >
    Create Jira Task tickets as sub-tasks under the Stories created in
    the previous step.  Tasks are the atomic units of work that AI
    coding agents (Codex, Copilot, vibe-coding) pick up and execute
    autonomously.

    **CRITICAL — Agent-Ready Tasks**: Every Task description MUST
    contain enough detail that an AI agent can start coding
    immediately without asking for clarification.  Each Task
    description MUST include ALL of the following sections:

    1. **Reasoning** — WHY this task exists, what problem it solves,
       and how it fits into the larger feature
    2. **Step-by-step instructions** — Numbered implementation steps
       that an AI coding agent can follow linearly
    3. **Sample data** — Concrete JSON examples, mock payloads, or
       test fixtures the agent can copy-paste into code
    4. **Guard rails** — Explicit list of things NOT to do, forbidden
       patterns, constraints, and out-of-scope work
    5. **Definition of done** — Checklist of acceptance criteria that
       can be verified programmatically

    ## Stories Created
    {stories_output}

    ## PRD Functional Requirements
    {functional_requirements}

    {additional_prd_context}

    ## Confluence Page
    {confluence_url}

    ## Instructions

    Use BOTH the functional requirements AND the additional PRD
    context above (especially non-functional requirements, edge cases,
    error handling scenarios) to produce maximally detailed tasks.
    For each Story created in the previous step, break it down into
    **3-7 specific Tasks**.  Each Task should be a concrete, atomic,
    agent-executable work item.

    ---

    ### UX Tasks (under UX Stories)
    UX tasks produce the design artefacts that Architecture and
    Engineering depend on.  Each UX task description must include:

    - **Reasoning**: Why this design artefact is needed and which
      user journey it supports
    - **Deliverables**: Exact list of screens, states, and components
    - **Sample content**: Representative placeholder text, sample
      user names, avatar URLs, and mock data for every screen
    - **Interaction states**: Loading skeleton, empty state, error
      state, success state — with specific copy for each
    - **Accessibility requirements**: WCAG 2.1 AA minimum — contrast
      ratios, focus order, ARIA labels, keyboard navigation
    - **Guard rails**: Do NOT introduce new colour tokens without
      design-system review; Do NOT deviate from the existing grid

    Task categories:
    - User research / persona validation
    - Wireframe creation for each screen and interaction flow
    - High-fidelity mockup / clickable prototype
    - Design-system component specification
    - Usability testing plan and accessibility annotations

    ---

    ### Architecture Tasks (under Architecture Stories)
    Architecture tasks define the **data definitions** that both
    Backend and Frontend engineering tasks depend on.  Every
    definition must be documented in the Confluence page so that
    engineers can reference it during implementation.

    **CRITICAL**: Architecture tasks must contain the FULL
    specification — not just a description of what to do, but the
    actual schema/contract itself with sample data.

    #### MongoDB Schema tasks — prefix: "[Data Schema] …"
    Each schema task description MUST include:

    - **Reasoning**: Why this collection is needed, what entity it
      models, and why no existing collection suffices
    - **Collection name**: e.g. ``user_preferences``
    - **Document structure**: Every field with its BSON type, whether
      required or optional, default value, and validation rules.
      Format as a table or structured list:
      ```
      Field            | Type     | Required | Default  | Notes
      _id              | ObjectId | yes      | auto     | Primary key
      user_id          | String   | yes      | —        | FK to users
      theme            | String   | no       | "light"  | "light"|"dark"
      notifications    | Object   | no       | {{}}       | Nested prefs
        .email         | Boolean  | no       | true     |
        .push          | Boolean  | no       | false    |
      created_at       | DateTime | yes      | now()    | ISO 8601
      updated_at       | DateTime | yes      | now()    | ISO 8601
      ```
    - **Indexes**: List every index with fields, direction, and
      uniqueness.  Example:
      ``{{ "user_id": 1 }}`` — unique
      ``{{ "created_at": -1 }}`` — for sorting
    - **Sample documents**: Provide 2-3 realistic JSON documents:
      ```json
      {{
        "_id": "665f1a2b3c4d5e6f7a8b9c0d",
        "user_id": "usr_abc123",
        "theme": "dark",
        "notifications": {{ "email": true, "push": false }},
        "created_at": "2026-03-01T10:00:00Z",
        "updated_at": "2026-03-01T10:00:00Z"
      }}
      ```
    - **Validation rules**: MongoDB JSON Schema validator or
      application-level checks
    - **Guard rails**: Do NOT embed unbounded arrays; Do NOT store
      derived/computed data; Do NOT use schemaless sub-documents
      for structured data

    #### API Definition tasks — prefix: "[API Definition] …"
    Each API task description MUST include:

    - **Reasoning**: Why this endpoint is needed, which user action
      triggers it, and how it fits into the feature's data flow
    - **Endpoint specification**:
      - Path: e.g. ``/api/v1/preferences``
      - Method: GET / POST / PUT / PATCH / DELETE
      - Authentication: Bearer token / API key / none
      - Rate limit: e.g. 100 req/min per user
    - **Request schema** with a concrete example:
      ```json
      POST /api/v1/preferences
      Content-Type: application/json
      Authorization: Bearer <token>

      {{
        "theme": "dark",
        "notifications": {{ "email": true, "push": false }}
      }}
      ```
    - **Success response** with a concrete example:
      ```json
      HTTP 201 Created
      {{
        "id": "pref_xyz789",
        "user_id": "usr_abc123",
        "theme": "dark",
        "notifications": {{ "email": true, "push": false }},
        "created_at": "2026-03-01T10:00:00Z"
      }}
      ```
    - **Error responses**: List every expected error with status code,
      error code, and message:
      ```
      400 Bad Request   — {{ "error": "INVALID_THEME", "message": "theme must be 'light' or 'dark'" }}
      401 Unauthorized  — {{ "error": "AUTH_REQUIRED", "message": "Bearer token missing or expired" }}
      409 Conflict      — {{ "error": "ALREADY_EXISTS", "message": "Preferences already exist for this user" }}
      ```
    - **Algorithm / business-logic notes**: If the endpoint
      involves non-trivial logic (ranking, matching, scheduling),
      specify the algorithm with reasoning for why it was chosen
    - **Guard rails**: Do NOT return internal ObjectIds in
      responses; Do NOT accept unvalidated input; Do NOT allow
      batch-size > 100

    Architecture tasks have **no internal blockers** — they can be
    worked in parallel under their Architecture story.

    ---

    ### Engineering Tasks (under Engineering Stories)
    Engineering tasks are split into **Frontend** and **Backend**
    categories.  Create tasks from both categories for each
    Engineering story.

    **CRITICAL**: Every Engineering task description must be
    **vibe-coding ready** — an AI agent must be able to read the
    ticket and start writing production code immediately.

    **IMPORTANT**: Every Frontend and Backend task **is blocked by**
    the relevant Architecture task(s) — set ``is_blocked_by_key``
    to the corresponding Architecture task key so that engineers
    cannot begin implementation until the data schema and API
    contract are defined.

    #### Backend tasks — prefix: "[Backend] …"
    Each Backend task description MUST include:

    - **Reasoning**: Why this service/endpoint/module is needed and
      which Architecture definition it implements
    - **Step-by-step implementation instructions**:
      1. Suggested file path (e.g. ``src/services/preferences.py``)
      2. Class/function signatures with type hints
      3. Dependencies to import and install
      4. Database operations (CRUD with the schema from the
         Architecture task)
      5. Error handling — which exceptions to catch, which HTTP
         status codes to return
      6. Logging — what to log at INFO vs WARNING vs ERROR
    - **Sample input/output**: Concrete request/response examples
      the agent can use for manual verification:
      ```
      Input:  {{ "theme": "dark", "notifications": {{ "email": true }} }}
      Output: {{ "id": "pref_xyz789", "status": "created" }}
      ```
    - **Guard rails**:
      - Do NOT modify existing middleware or shared utilities
      - Do NOT add new dependencies without documenting them
      - Do NOT use raw string SQL/queries — use ODM/ORM methods
      - Do NOT swallow exceptions silently
      - Do NOT return stack traces in API responses
    - **Definition of done**:
      - [ ] Endpoint responds correctly for valid input
      - [ ] Input validation rejects malformed payloads
      - [ ] Auth middleware enforces token verification
      - [ ] All database writes are idempotent where applicable
      - [ ] Logging covers happy path and error cases

    Backend task categories:
    - Database model/schema implementation (referencing the
      Architecture MongoDB schema definition)
    - API endpoint implementation (REST / GraphQL) per the
      Architecture API contract
    - Webhook integration and event handling
    - Business-logic / service-layer implementation
    - Authentication, authorisation, and security hardening
    - Third-party service integration

    #### Frontend tasks — prefix: "[Frontend] …"
    Each Frontend task description MUST include:

    - **Reasoning**: Why this component/page is needed and which
      UX wireframe it implements
    - **Step-by-step implementation instructions**:
      1. Suggested file path (e.g. ``src/components/Preferences/``)
      2. Component hierarchy and props interface (TypeScript types)
      3. State management approach (local state, context, store)
      4. API integration — which backend endpoint to call, request
         format, response handling
      5. Responsive breakpoints (mobile ≤ 768px, tablet ≤ 1024px,
         desktop > 1024px)
      6. Accessibility — ARIA labels, keyboard navigation, focus
         management
    - **Sample UI states** — describe or provide mock data for:
      - Loading state (skeleton placeholders)
      - Empty state (no data yet — specific copy)
      - Success state (populated with sample data)
      - Error state (API failure — specific error message)
    - **Guard rails**:
      - Do NOT use inline styles — use CSS modules or styled
        components
      - Do NOT make API calls in render — use hooks/effects
      - Do NOT store sensitive data in client-side state
      - Do NOT hardcode strings — use i18n keys
    - **Definition of done**:
      - [ ] Component renders all 4 states correctly
      - [ ] Responsive layout works at all breakpoints
      - [ ] Keyboard navigation works end-to-end
      - [ ] ARIA labels are present on all interactive elements
      - [ ] API integration handles loading, success, and error

    Where tasks have natural ordering (e.g. "[Backend] Implement DB
    model" must complete before "[Backend] Implement API endpoint"),
    use the ``is_blocked_by_key`` parameter to link them **in addition
    to** the Architecture dependency.

    ---

    ### QE Tasks (under QE Stories)
    QE tasks verify correctness of the Engineering implementation.
    Create **two categories** of QE tasks for every Engineering task:

    **CRITICAL**: Every QE task must contain concrete test scenarios
    with sample data that a QA agent can convert directly into test
    code without inventing test cases from scratch.

    #### Unit / Integration Test tasks
    Prefix: "[Unit Test — Backend] …" or "[Unit Test — Frontend] …"

    Each test task description MUST include:

    - **Reasoning**: Why these tests are needed and which Engineering
      task they verify
    - **Reference**: The Engineering task key this test covers
    - **Happy-path test scenarios** — concrete test cases:
      ```
      SCENARIO: Create preferences with valid input
      GIVEN:  user_id="usr_abc123", payload={{ "theme": "dark" }}
      WHEN:   POST /api/v1/preferences
      THEN:   status=201, response.theme=="dark"
      ```
    - **Edge-case test scenarios** — boundary conditions:
      ```
      SCENARIO: Handle maximum-length theme value
      GIVEN:  payload={{ "theme": "a" * 256 }}
      WHEN:   POST /api/v1/preferences
      THEN:   status=400, error="INVALID_THEME"

      SCENARIO: Handle concurrent creation
      GIVEN:  Two simultaneous POST requests for same user_id
      WHEN:   Both processed
      THEN:   One succeeds (201), one fails (409 ALREADY_EXISTS)
      ```
    - **Negative test scenarios** — expected failures:
      ```
      SCENARIO: Reject unauthenticated request
      GIVEN:  No Authorization header
      WHEN:   POST /api/v1/preferences
      THEN:   status=401, error="AUTH_REQUIRED"

      SCENARIO: Reject invalid JSON body
      GIVEN:  body="not json"
      WHEN:   POST /api/v1/preferences
      THEN:   status=400, error="INVALID_JSON"

      SCENARIO: Handle non-existent user
      GIVEN:  user_id="usr_nonexistent"
      WHEN:   GET /api/v1/preferences/usr_nonexistent
      THEN:   status=404, error="NOT_FOUND"
      ```
    - **Sample test data fixtures** ready to copy-paste:
      ```python
      VALID_PREFERENCE = {{
          "user_id": "usr_abc123",
          "theme": "dark",
          "notifications": {{ "email": True, "push": False }},
      }}
      INVALID_PREFERENCE_MISSING_THEME = {{
          "user_id": "usr_abc123",
      }}
      INVALID_PREFERENCE_BAD_TYPE = {{
          "user_id": "usr_abc123",
          "theme": 12345,
      }}
      ```
    - **Guard rails**:
      - Do NOT test implementation details (private methods)
      - Do NOT use production data — only fixtures defined above
      - Do NOT mock the unit under test — only mock dependencies
      - Do NOT write flaky tests that depend on timing
    - **Definition of done**:
      - [ ] All happy-path scenarios pass
      - [ ] All edge-case scenarios pass
      - [ ] All negative scenarios return expected errors
      - [ ] Test coverage ≥ 90% for the module under test
      - [ ] No flaky tests

    Each QE task must have ``is_blocked_by_key`` set to the
    corresponding Engineering task key so the QE task cannot start
    until the implementation exists.

    ---

    For each Task, call the jira_create_issue tool with:
    - Issue type: "Task"
    - Summary: Specific, actionable title with the appropriate prefix
    - Description: MUST include ALL five sections — Reasoning,
      Step-by-step instructions, Sample data, Guard rails, and
      Definition of done (as described above for each role)
    - Parent key: The Story key this Task belongs under
    - Labels: "prd,auto-generated"
    - Run ID: {run_id}
    - Confluence URL: "{confluence_url}"
    - Component: Same component as the parent Story ("UX",
      "Architecture", "Engineering", or "QE")

  expected_output: >
    A structured list of all Jira Task keys created, grouped by
    parent Story, with their URLs.  Format:
      Story STORY_KEY:
        - TASK_KEY: Summary — URL
        - TASK_KEY: Summary — URL
    followed by a summary of dependency links created.
    If any creation failed, include the error details.
