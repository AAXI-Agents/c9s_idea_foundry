publish_to_confluence_task:
  description: >
    A completed PRD markdown document is available for publishing.

    ## PRD Content
    {prd_content}

    ## Instructions
    Publish this PRD to the Atlassian Confluence project space using
    the confluence_publisher tool.

    Use the following title for the page:
      "{page_title}"

    The run_id for tracking is: {run_id}

    If the page already exists, it will be updated with the latest content.
    If it does not exist, a new page will be created.
  expected_output: >
    Confirmation that the PRD was published to Confluence, including
    the page ID and URL.  If the publish failed, include the error
    details.

generate_jira_skeleton_task:
  description: >
    Generate a skeleton outline of Jira Epics and User Stories that will
    be created from the PRD, **without creating any tickets yet**.  This
    is a planning step — the user must approve the skeleton before any
    Jira issues are created.

    ## PRD Title
    {page_title}

    ## Executive Summary
    {executive_summary}

    ## PRD Functional Requirements
    {functional_requirements}

    {additional_prd_context}

    ## Project Tools & Architecture
    The implementation should follow these defaults unless the PRD
    specifies otherwise:
    - **Data Persistence**: MongoDB (as used by the project).  If the
      PRD specifies a different data store, note it.
    - **Data Layer**: FastAPI (REST API) and Webhooks for data
      interaction.  If the PRD specifies a different framework, note it.
    - **Data Presentation**: React with TypeScript for web.  Web-only
      unless the PRD specifies other platforms (Android, iOS).
    - **App & Data Security**: Role-based access control, environment
      property management, database injection prevention, input
      validation, and authentication/authorization at all layers.

    ## Instructions

    Analyse the PRD and produce a structured skeleton with:

    1. **Epics** — one Epic per key feature area of the idea.  Each
       Epic represents a major capability.  Note dependencies between
       Epics (e.g. "Auth Epic must be completed before Payment Epic").

    2. **User Stories per Epic** — organised into these four
       categories:
       - **Data Persistence**: Stories for database schema design,
         data models, indexes, migrations.
       - **Data Layer**: Stories for API endpoints, webhooks, service
         layer, business logic.
       - **Data Presentation**: Stories for UI components, pages,
         state management, responsive design.
       - **App & Data Security**: Stories for auth, RBAC, input
         validation, environment config, injection prevention.

    For each Epic and Story, provide ONLY the title — do NOT write
    descriptions or acceptance criteria yet.

    ## Output Format

    ```
    EPIC 1: [Epic Title]
      Dependencies: [list of other Epic numbers this depends on, or "None"]
      Stories:
        [Data Persistence]
          - [Story title]
          - [Story title]
        [Data Layer]
          - [Story title]
          - [Story title]
        [Data Presentation]
          - [Story title]
          - [Story title]
        [App & Data Security]
          - [Story title]

    EPIC 2: [Epic Title]
      Dependencies: [e.g. "EPIC 1"]
      Stories:
        [Data Persistence]
          - [Story title]
        ...
    ```

    Keep Story titles concise but descriptive (e.g.
    "[Data Persistence] User preferences MongoDB schema",
    "[Data Layer] POST /api/v1/preferences endpoint",
    "[Data Presentation] Preferences settings page component",
    "[App & Data Security] RBAC for preferences API").

  expected_output: >
    A structured skeleton listing all Epics (with inter-Epic
    dependencies) and User Story titles grouped by category
    (Data Persistence, Data Layer, Data Presentation, App & Data
    Security) under each Epic.  No descriptions — titles only.

generate_kanban_skeleton_task:
  description: >
    Generate a flat list of Jira Tasks for a Kanban board based on the
    PRD, **without creating any tickets yet**.  This is a planning step
    — the user must approve the task list before any Jira issues are
    created.

    Unlike the Scrum skeleton (Epics → Stories → Sub-tasks), this
    Kanban skeleton produces a flat list of actionable Tasks with
    priority and category labels.

    ## PRD Title
    {page_title}

    ## Executive Summary
    {executive_summary}

    ## PRD Functional Requirements
    {functional_requirements}

    {additional_prd_context}

    ## Instructions

    Analyse the PRD and produce a flat list of Jira Tasks:

    1. Each task should be a single actionable work item.
    2. Assign a **priority** to each task: critical, high, medium, low.
    3. Assign a **category label** to each task:
       - `backend` — API endpoints, services, business logic, webhooks
       - `frontend` — UI components, pages, state management
       - `database` — schemas, models, indexes, migrations
       - `testing` — test cases, test infrastructure, QA
       - `infrastructure` — deployment, CI/CD, environment config
       - `security` — auth, RBAC, input validation, injection prevention
       - `documentation` — API docs, user guides, architecture docs
    4. Group tasks by priority (critical first, then high, medium, low).
    5. Note dependencies between tasks where order matters.

    ## Output Format

    ```
    CRITICAL:
      - [category] Task title (depends on: Task N, or "none")
      - [category] Task title
    HIGH:
      - [category] Task title
    MEDIUM:
      - [category] Task title
    LOW:
      - [category] Task title
    ```

    Keep task titles concise but descriptive (e.g.
    "[backend] POST /api/v1/preferences endpoint",
    "[frontend] Preferences settings page component",
    "[database] User preferences MongoDB schema",
    "[security] RBAC for preferences API").

  expected_output: >
    A flat list of Jira Tasks grouped by priority (critical, high,
    medium, low) with category labels and dependency notes.
    No Epics or Stories — just actionable Tasks.

create_jira_epic_task:
  description: >
    Create a Jira Epic to track the implementation of a newly published
    PRD.

    ## PRD Title
    {page_title}

    ## Executive Summary
    {executive_summary}

    ## Confluence Page
    {confluence_url}

    ## Instructions
    Create a Jira Epic using the jira_create_issue tool with:
    - Summary: "{page_title}"
    - Issue type: "Epic"
    - Description: The executive summary content above.  The Confluence
      page link will be automatically appended.
    - Labels: "prd,auto-generated"
    - Run ID: {run_id}
    - Confluence URL: "{confluence_url}"

    This Epic will serve as the parent for all Stories and Tasks
    derived from the PRD requirements.
  expected_output: >
    The Jira Epic key and URL confirming successful creation.
    If creation failed, include the error details.

create_jira_stories_task:
  description: >
    Create Jira Story tickets for each functional requirement, organised
    by category (Data Persistence, Data Layer, Data Presentation, App &
    Data Security).  Each Story represents a work stream for a specific
    layer under the parent Epic.

    **IMPORTANT — Agent-Ready Stories**: Every Story description you
    create must be detailed enough that an AI coding agent (e.g. Codex,
    Copilot) or a vibe-coding session can pick up the ticket and start
    working immediately without asking for clarification.

    ## Approved Skeleton
    {approved_skeleton}

    ## PRD Functional Requirements
    {functional_requirements}

    {additional_prd_context}

    ## Parent Epic
    {epic_key}

    ## Confluence Page
    {confluence_url}

    ## Project Tools & Architecture Defaults
    Unless the PRD specifies otherwise, use these defaults:
    - **Data Persistence**: MongoDB — collections, document schemas,
      indexes, validators
    - **Data Layer**: FastAPI REST API and Webhooks
    - **Data Presentation**: React with TypeScript (web only unless
      PRD specifies Android/iOS)
    - **App & Data Security**: RBAC, env configuration, injection
      prevention, input validation, auth/authz

    ## Instructions

    Follow the approved skeleton above.  For each Story title in the
    skeleton, create a full Jira Story with detailed description and
    acceptance criteria.  Use the following four categories and create
    them **in the order listed**:

    ### 1. Data Persistence Stories (create these FIRST)
    Data Persistence stories must be completed before Data Layer work
    can begin.  Each story covers database/storage concerns:
    - **MongoDB collection design** — document structure, field types,
      required vs optional, defaults, validation rules
    - **Indexes** — list every index with fields, direction, uniqueness
    - **JSON Schema validator** — full ``$jsonSchema`` for MongoDB
    - **Sample documents** — 2-3 realistic JSON documents per collection
    - **Migration strategy** — if modifying existing collections,
      specify backward-compatible steps
    Component: "Data Persistence"

    ### 2. Data Layer Stories (depend on Data Persistence)
    Data Layer stories define API endpoints, webhooks, and business
    logic.  Each Data Layer story **is blocked by** the corresponding
    Data Persistence story — set ``is_blocked_by_key`` to the Data
    Persistence story key.
    Data Layer stories cover:
    - **REST API endpoints** — path, method, request/response schema,
      error responses with status codes, sample JSON
    - **Webhook definitions** — event types, payload schema, retry
      policy, idempotency keys, dead-letter queue
    - **Business logic / service layer** — algorithms, state machines,
      validation rules
    - **OpenAPI 3.1 specification fragments** for every endpoint
    Component: "Data Layer"

    ### 3. Data Presentation Stories (depend on Data Layer)
    Data Presentation stories describe the frontend/UI implementation.
    Each Data Presentation story **is blocked by** the corresponding
    Data Layer story — set ``is_blocked_by_key`` to the Data Layer
    story key.
    Unless the PRD specifies otherwise, use **React with TypeScript**
    for web.  Only include Android/iOS stories if the PRD explicitly
    requests mobile platforms.
    Each Data Presentation story must include:
    - **Component hierarchy** and props interfaces (TypeScript types)
    - **UI states** — loading, empty, success, error with sample data
    - **Responsive breakpoints** — mobile, tablet, desktop
    - **Accessibility** — WCAG 2.1 AA, ARIA labels, keyboard nav
    - **API integration** — which Data Layer endpoints to call
    - **State management approach** — local state, context, or store
    Component: "Data Presentation"

    ### 4. App & Data Security Stories (span all layers)
    Security stories provide protection across all layers.  Each
    security story **is blocked by** the corresponding Data Layer
    story — set ``is_blocked_by_key`` to the Data Layer story key.
    Security stories must cover:
    - **Role-based access control (RBAC)** — define roles, permissions,
      middleware/guards for API and UI routes
    - **Environment properties** — secrets management, config files,
      env var validation, no hardcoded credentials
    - **Database injection prevention** — parameterised queries, ORM
      usage, input sanitization
    - **Input validation** — request body validation, query param
      validation, file upload restrictions
    - **Authentication & authorization** — token verification, session
      management, CORS, CSP headers
    Component: "App & Data Security"

    For each Story, call the jira_create_issue tool with:
    - Issue type: "Story"
    - Summary: A concise title prefixed with the category, e.g.
      "[Data Persistence] User preferences MongoDB schema" or
      "[Data Layer] POST /api/v1/preferences endpoint" or
      "[Data Presentation] Preferences settings page" or
      "[App & Data Security] RBAC for preferences API"
    - Description: Detailed acceptance criteria for this category.
    - Epic key: "{epic_key}"
    - Labels: "prd,auto-generated"
    - Run ID: {run_id}
    - Confluence URL: "{confluence_url}"
    - Component: The category name ("Data Persistence", "Data Layer",
      "Data Presentation", or "App & Data Security")
    - is_blocked_by_key: For Data Layer stories, set this to the
      corresponding Data Persistence story key.  For Data Presentation
      stories, set this to the corresponding Data Layer story key.
      For App & Data Security stories, set this to the corresponding
      Data Layer story key.

    ### Dependency summary
    Data Persistence stories have **no blockers** — they are the
    starting point.
    Data Layer stories are **blocked by** the matching Data Persistence
    story.
    Data Presentation stories are **blocked by** the matching Data
    Layer story.
    App & Data Security stories are **blocked by** the matching Data
    Layer story.

    ### Epic Dependencies
    When creating Epics, also set up ``is_blocked_by_key`` links
    between Epics as specified in the approved skeleton's dependency
    list.

    Keep each Story small enough to be estimated and completed in one
    sprint.

    **IMPORTANT**: Record every Story key you create — you will need
    them for the next step where sub-tasks are created.
  expected_output: >
    A structured list of all Jira Story keys created, grouped by
    category, with their URLs.  Format each as:
      [CATEGORY] STORY_KEY: Summary — URL
    followed by a summary of dependency links created.
    If any creation failed, include the error details.

create_jira_tasks_task:
  description: >
    Create Jira Sub-Task tickets under the Stories created in the
    previous step.  Sub-Tasks are the atomic units of work that
    engineering agents pick up.  The team does NOT work on User
    Stories directly — they work on Sub-Tasks.

    Break each User Story into smaller components that can be done
    by multiple engineering agents working in parallel.

    ## Engineering Squad
    Your squad has specialised agents.  Every Sub-Task is assigned to
    exactly one agent role:
      1. **Data Engineer** — database schemas, migrations, indexes
      2. **Backend Engineer** — APIs, services, webhooks, business logic
      3. **Frontend Engineer** — UI components, state, integration
      4. **Security Engineer** — auth, RBAC, validation, hardening
      5. **Quality Engineer (QE)** — test suites, coverage, validation

    ## Agent-Ready Sub-Tasks
    **CRITICAL**: Every Sub-Task description MUST contain enough
    detail that an AI coding agent (Claude Opus 4.6 Codex) can start
    working immediately without asking for clarification.

    Each Sub-Task description MUST include ALL of these sections:

    1. **Reasoning** — WHY this sub-task exists, what problem it
       solves, and how it fits into the larger feature
    2. **Step-by-step Instructions** — Numbered implementation steps
       that an AI coding agent can follow linearly
    3. **Sample Data** — Concrete JSON examples, mock payloads, or
       test fixtures the agent can copy-paste into code
    4. **Guard Rails** — Explicit list of things NOT to do, forbidden
       patterns, constraints, and out-of-scope work
    5. **Definition of Done** — Checklist of acceptance criteria that
       can be verified programmatically
    6. **Test Cases for QE** — GIVEN/WHEN/THEN scenarios covering
       happy path, edge cases, and negative cases that the Quality
       Engineer agent will use to verify this sub-task
    7. **Unit Test Cases** — Specific unit test cases the implementing
       agent must write alongside the code

    ## Sub-Task Dependencies
    **CRITICAL**: Sub-tasks have dependencies on each other that MUST
    be captured with ``is_blocked_by_key`` links:

    - Data Persistence sub-tasks have **no blockers** — start here
    - Data Layer sub-tasks are **blocked by** Data Persistence sub-tasks
      (API endpoints need the database schema to be defined first)
    - Data Presentation sub-tasks are **blocked by** Data Layer sub-tasks
      (UI components need API endpoints to integrate with)
    - API Integration Testing sub-tasks are **blocked by BOTH** Data
      Layer AND Data Presentation sub-tasks (integration tests verify
      the full stack works end-to-end)
    - App & Data Security sub-tasks are **blocked by** Data Layer
      sub-tasks (security hardening requires endpoints to exist)
    - QE sub-tasks are **blocked by** the corresponding implementation
      sub-task

    ## Stories Created
    {stories_output}

    ## PRD Functional Requirements
    {functional_requirements}

    {additional_prd_context}

    ## Confluence Page
    {confluence_url}

    ## Instructions

    For each Story created in the previous step, decompose it into
    **3-7 Sub-Tasks**.  Each Sub-Task should be a concrete, atomic,
    agent-codex-executable work item.

    ---

    ### Data Persistence Sub-Tasks (under Data Persistence Stories)

    #### Data Schema sub-tasks — prefix: "[Data Schema] …"
    Each schema sub-task description MUST include:
    - **Collection name** and document structure (every field with
      BSON type, required/optional, defaults, validation)
    - **Indexes** with fields, direction, uniqueness
    - **JSON Schema validator** (MongoDB $jsonSchema)
    - **Sample documents** (2-3 realistic examples)
    - **Migration strategy** for existing collections
    - **Unit Test Cases**: Tests that validate schema enforcement,
      required field presence, and index effectiveness

    #### State Machine sub-tasks — prefix: "[State Machine] …"
    - **Mermaid state diagram** with all states and transitions
    - **Transition table**: from-state, event, guard, to-state
    - **Invalid transition handling** with error codes
    - **Concurrency guards** and optimistic locking strategy

    ---

    ### Data Layer Sub-Tasks (under Data Layer Stories)

    #### API Definition sub-tasks — prefix: "[API Definition] …"
    - **OpenAPI 3.1 specification fragment** (YAML)
    - **Full request/response examples** (headers + body)
    - **Error responses** with structured error codes
    - **Rate limiting** and idempotency key specs
    - **Unit Test Cases**: Tests for each endpoint's request
      validation, response format, and error handling

    #### Webhook sub-tasks — prefix: "[Webhook] …"
    - **Event type taxonomy** (domain.entity.action)
    - **Payload JSON schema** with examples
    - **Retry policy matrix** and dead-letter queue handling
    - **Signature verification** (HMAC-SHA256)

    #### Backend Implementation — prefix: "[Backend] …"
    - **File paths** and function signatures with type hints
    - **Database operations** referencing Data Schema sub-tasks
    - **Error handling** referencing Error Taxonomy
    - **Unit Test Cases**: Tests for service layer logic,
      database CRUD operations, and error paths

    ---

    ### Data Presentation Sub-Tasks (under Data Presentation Stories)

    #### Frontend sub-tasks — prefix: "[Frontend] …"
    - **Component hierarchy** and TypeScript props interfaces
    - **UI states**: Loading, Empty, Success, Error with mock data
    - **API integration** referencing Data Layer endpoints
    - **Responsive breakpoints** (mobile, tablet, desktop)
    - **Accessibility** (WCAG 2.1 AA, ARIA, keyboard nav)
    - **Unit Test Cases**: Component render tests, state transition
      tests, and accessibility audit tests

    #### API Integration sub-tasks — prefix: "[API Integration] …"
    These verify that Data Layer and Data Presentation work together.
    - **is_blocked_by_key**: Set to BOTH the Data Layer sub-task AND
      the Data Presentation sub-task keys
    - **Integration test scenarios** covering the full request flow
      from UI action → API call → database → response → UI update
    - **Sample integration test data** with realistic payloads
    - This sub-task type is specifically for testing the integrated
      layer after both backend and frontend are complete

    ---

    ### App & Data Security Sub-Tasks (under Security Stories)

    #### Security sub-tasks — prefix: "[Security] …"
    - **RBAC definitions** — roles, permissions, middleware guards
    - **Input validation rules** — sanitization, injection prevention
    - **Environment config** — secrets management, env var validation
    - **Auth flows** — token verification, session management
    - **Unit Test Cases**: Tests for permission enforcement, input
      rejection, and auth flow edge cases

    ---

    ### QE Sub-Tasks (under all Story types)
    Create QE verification sub-tasks for every implementation sub-task.

    #### Test sub-tasks — prefix: "[Unit Test — …] …"
    Each test sub-task description MUST include:
    - **GIVEN/WHEN/THEN** scenarios for happy path, edge cases,
      negative cases
    - **JSON schema validation tests**
    - **API contract verification tests**
    - **Sample test data fixtures** ready to copy-paste
    - **Coverage target**: >= 90% for the module under test
    - **is_blocked_by_key**: Set to the implementation sub-task key

    ---

    ## Self-Improvement Check

    After creating all sub-tasks for a Story, verify:
    1. Could an agent start each sub-task without asking questions?
    2. Are all dependency links captured with ``is_blocked_by_key``?
    3. Does every sub-task include QE test cases and unit test cases?
    4. Are API Integration sub-tasks blocked by both Data Layer and
       Data Presentation sub-tasks?
    5. Is each sub-task small enough for one agent to complete?

    ---

    For each Sub-Task, call the jira_create_issue tool with:
    - Issue type: "Task"
    - Summary: Specific, actionable title with the appropriate prefix
    - Description: MUST include ALL seven sections (Reasoning,
      Instructions, Sample Data, Guard Rails, Definition of Done,
      Test Cases for QE, Unit Test Cases)
    - Parent key: The Story key this Sub-Task belongs under
    - Labels: "prd,auto-generated"
    - Run ID: {run_id}
    - Confluence URL: "{confluence_url}"
    - Component: Same component as the parent Story
    - is_blocked_by_key: Set according to the dependency rules above

  expected_output: >
    A structured list of all Jira Sub-Task keys created, grouped by
    parent Story, with their URLs and dependency links.  Format:
      Story STORY_KEY:
        - TASK_KEY: Summary — URL (blocked by: TASK_KEY)
        - TASK_KEY: Summary — URL
    followed by a summary of all dependency links created.
    If any creation failed, include the error details.

create_kanban_tasks_task:
  description: >
    Create Jira Task tickets from the approved Kanban task list.
    Each item becomes a flat Jira "Task" issue (NOT an Epic, Story,
    or Sub-task).

    ## Approved Task List
    {kanban_skeleton}

    ## PRD Title
    {page_title}

    ## PRD Functional Requirements
    {functional_requirements}

    {additional_prd_context}

    ## Confluence Page
    {confluence_url}

    ## Instructions

    For each task in the approved list:

    1. Create a Jira issue with type **Task**.
    2. Set the **priority** field (Critical, High, Medium, Low).
    3. Apply **labels**: the category label (backend, frontend,
       database, testing, infrastructure, security, documentation)
       plus "prd" and "auto-generated".
    4. Write a clear description that an AI coding agent can work
       from, including:
       - Reasoning: Why this task exists
       - Step-by-step instructions
       - Definition of done (acceptance criteria)
    5. Add ``is_blocked_by_key`` links to capture task dependencies.
    6. Include the run ID ``{run_id}`` and Confluence URL in each
       ticket description.

    Do NOT create Epics, Stories, or Sub-tasks — only flat Tasks.

  expected_output: >
    A list of all Jira Task keys created with their URLs, priority,
    and category labels.  Format each as:
      [PRIORITY] [CATEGORY] TASK_KEY: Summary — URL
    followed by a summary of dependency links created.
    If any creation failed, include the error details.
