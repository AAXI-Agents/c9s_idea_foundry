"draft_prd_task":
  description: >
    Create a comprehensive Product Requirements Document (PRD) for the
    following feature idea including researching competitors and technical
    standards to ensure the PRD is grounded in industry best practices.
    The idea is provided by the user in the {idea} field.

    The PRD starts with the "Executive Summary". It is iterated between
    the minimum and maximum iteration count before moving to individual
    sections. The Executive Summary is provided in {executive_summary}.

    Write a compelling, detailed executive summary that:
    - Clearly articulates the problem being solved
    - Defines the target audience and key stakeholders
    - Outlines the proposed solution and its key differentiators
    - Highlights expected business impact and success criteria
    - Is consistent with industry best practices for PRD documentation
    - Is written in clear, professional markdown format

    Output ONLY the executive summary content in markdown format.
    Do NOT wrap the output in JSON, code fences, or any document structure.
    Do NOT include metadata fields like run_id, status, timestamps, or
    iteration tracking — the system handles persistence automatically.

  expected_output: >
    A well-written, comprehensive executive summary in clear, professional
    markdown format.

    Output ONLY the executive summary body content — no JSON wrapper, no
    metadata fields, no document structure. The system stores iterations
    and metadata automatically.

  agent: product_manager

critique_prd_task:
  description: >
    Critically review the following PRD executive summary draft and
    identify gaps, weaknesses, and missing elements.
    The critique is provided in the {critique} field.

    Evaluate against the Definition of Done (DoD) checklist:
    1. Is the problem statement clear and concise?
    2. Are all user personas clearly defined with pain points and goals?
    3. Are functional requirements specific and testable?
    4. Are non-functional requirements quantified (performance targets, scale limits)?
    5. Are edge cases and error scenarios addressed comprehensively?
    6. Are analytics/tracking requirements specified with concrete metrics?
    7. Are dependencies and risks documented with mitigations?

    For each gap found, provide a specific, actionable recommendation.
    Rate the PRD readiness on a scale of 1-10.
    If the PRD scores 8 or higher on ALL criteria, mark it as "READY_FOR_DEV".
    Otherwise mark it as "NEEDS_REFINEMENT".

    Use the provided {executive_summary} as the content to evaluate.
    Provide your critique as structured feedback that can be used to
    improve the executive summary in the next iteration.
  expected_output: >
    A structured critique in markdown format containing:
    - Readiness score (1-10) for each DoD criterion
    - Overall status: "READY_FOR_DEV" or "NEEDS_REFINEMENT"
    - List of identified gaps with severity (Critical / Major / Minor)
    - Specific, actionable recommendations for each gap

    Output ONLY the critique content in markdown — no JSON wrapper, no
    metadata fields. The system handles iteration tracking automatically.
  agent: product_manager

# ── Section-level tasks ──────────────────────────────────────
draft_section_task:
  description: >
    You are drafting the **{section_title}** section of a Product Requirements
    Document (PRD) for the following feature idea:

    {idea}

    --- SECTION CONTENT ---
    {section_content}
    --- END OF SECTION CONTENT ---

    The full PRD has these sections (each is indvidual **{section_title}**):
      1. Problem Statement (describing the problem being solved)
      2. User Personas (describing the users of the feature)
      3. Functional Requirements (detailing the specific functionalities needed)
      4. Non-Functional Requirements (describing performance, scalability, security, etc.)
      5. Edge Cases (covering unusual but possible scenarios)
      6. Error Handling (detailing how errors are managed)
      7. Success Metrics (defining how success will be measured)
      8. Dependencies (listing any dependencies on other teams, systems, or technologies)
      9. Assumptions (stating any assumptions made during the planning)

    --- EXECUTIVE PRODUCT SUMMARY ---
    {executive_product_summary}
    --- END OF EXECUTIVE PRODUCT SUMMARY ---

    --- ENGINEERING PLAN ---
    {engineering_plan}
    --- END OF ENGINEERING PLAN ---

    Write a comprehensive, detailed **{section_title}** section that:
    - Use the Executive Product Summary as the authoritative reference for
      product vision, tone, and ambition.
    - Use the Engineering Plan for technical architecture context and
      implementation details.
    - Stays strictly within the scope of this section type — do NOT
      duplicate content that belongs in another section listed above.
    - Is consistent with the other sections provided as context above.
    - Contains specific, actionable content appropriate for this section type.
    - Follows industry best practices for PRD documentation.
    - Is written in clear, professional markdown format.

    Output ONLY the content for the **{section_title}** section.
    Do NOT include the section heading — just the body content.
    Do NOT wrap the output in JSON or any other structure.
  expected_output: >
    A well-written, comprehensive {section_title} section in clear,
    professional markdown format.

    Output ONLY the body content for this section — no section heading,
    no JSON wrapper, no metadata.  The content will be stored by the
    system automatically.
  agent: product_manager

critique_section_task:
  description: >
    Critically review the **{section_title}** section of a PRD.

    Use the Executive Product Summary as the authoritative reference
    for product vision, tone, scope, and ambition:

    --- EXECUTIVE PRODUCT SUMMARY ---
    {executive_product_summary}
    --- END OF EXECUTIVE PRODUCT SUMMARY ---

    Use the Engineering Plan for technical architecture context:

    --- ENGINEERING PLAN ---
    {engineering_plan}
    --- END OF ENGINEERING PLAN ---

    Here are the other sections already approved for this PRD — use them
    to check cross-section consistency and avoid duplication:

    --- APPROVED SECTIONS ---
    {approved_sections}
    --- END OF APPROVED SECTIONS ---

    Now critically review this section:

    --- CRITIQUE SECTION CONTENT ---
    {critique_section_content}
    --- END OF CRITIQUE SECTION CONTENT ---

    Evaluate the section for:
    1. Completeness — does it cover everything expected for this section type?
    2. Specificity — are requirements concrete and testable?
    3. Consistency — does it align with the executive summary and the other
       approved sections above?
    4. Clarity — is it well-organized and unambiguous?
    5. Actionability — can a development team act on this?
    6. No Duplication — does it avoid repeating content from other sections?

    For each gap, provide a specific, actionable recommendation.
    Rate readiness on a scale of 1-10.
    If the section scores 8 or higher on ALL criteria, mark it as "SECTION_READY".
    Otherwise mark it as "NEEDS_REFINEMENT".
  expected_output: >
    A structured critique containing:
    - Readiness score (1-10) for each criterion
    - Overall status: "SECTION_READY" or "NEEDS_REFINEMENT"
    - List of identified gaps with severity (Critical / Major / Minor)
    - Specific recommendations for each gap
  agent: product_manager

refine_section_task:
  description: >
    Refine the **{section_title}** section of a PRD based on critique section feedback.

    Use the Executive Product Summary as the authoritative reference
    for product vision, tone, scope, and ambition:

    --- EXECUTIVE PRODUCT SUMMARY ---
    {executive_product_summary}
    --- END OF EXECUTIVE PRODUCT SUMMARY ---

    Use the Engineering Plan for technical architecture context:

    --- ENGINEERING PLAN ---
    {engineering_plan}
    --- END OF ENGINEERING PLAN ---

    Here are the other sections already approved for this PRD — maintain
    consistency with them and avoid duplicating their content:

    --- APPROVED SECTIONS ---
    {approved_sections}
    --- END OF APPROVED SECTIONS ---

    --- CURRENT SECTION CONTENT ---
    {section_content}
    --- END OF SECTION CONTENT---

    --- CRITIQUE SECTION CONTENT ---
    {critique_section_content}
    --- END OF CRITIQUE SECTION CONTENT ---

    Address every gap and recommendation identified in the critique.
    Focus especially on Critical and Major issues first.
    Ensure the refined section is:
    - Consistent with the executive summary and the other approved sections
    - Comprehensive and ready for development handoff
    - Specific and actionable
    - Free of content that belongs in other sections

    Output ONLY the refined content for the **{section_title}** section.
    Do NOT include the section heading — just the body content.
  expected_output: >
    An improved {section_title} section that addresses every gap from
    the critique feedback, in clear professional markdown format.

    Output ONLY the refined body content — no section heading, no JSON
    wrapper, no metadata.  The system stores iterations automatically.
  agent: product_manager

# ── Requirements Breakdown Tasks ──────────────────────────────

breakdown_requirements_task:
  description: >
    You are a Senior Solutions Architect breaking down a refined product
    idea into structured, implementation-ready product requirements.

    ## The Refined Idea
    {idea}

    ## Previous Requirements (Your Prior Output)
    {previous_requirements}

    ## Your Task
    Decompose this idea into **product features**, where each feature
    is a self-contained capability of the application.  If previous
    requirements exist above, **build upon and improve them** — do NOT
    start from scratch.  Address every gap identified in the feedback,
    add missing detail, and refine existing sections.

    For EACH feature produce the following sections:

    ### 1. Feature Overview
    - Feature name (concise, noun-phrase)
    - One-paragraph description of what this feature does
    - Primary user role(s) it serves (e.g., Broker, Developer, Admin)
    - How an AI agent augments the user in this feature
    - User stories in "As a [role], I want [action] so that [benefit]" format

    ### 2. Data Entities & Attributes
    For every data entity this feature introduces or touches:
    - Entity name (PascalCase)
    - ALL attributes with concrete data types (string, int, float,
      datetime, boolean, enum with values, ObjectId, etc.)
    - Required vs. optional flag for each attribute
    - Default values where applicable
    - Validation rules (min/max length, regex, range)
    - Relationships to other entities (1:1, 1:N, M:N) with
      foreign key field names
    - Indexes (single-field, compound, unique, TTL) with field names
    - Example document / record shape (JSON)

    ### 3. State Machine
    For entities that have lifecycle states:
    - List every valid state with a one-line description
      (e.g., Draft — initial state before submission)
    - Define ALL valid transitions as "FromState → ToState (trigger)"
    - Note which transitions an AI agent can initiate vs. user-only
    - Business rules or guards on each transition
    - Side effects on transition (e.g., send notification, update
      related entity, emit event)
    - Invalid transitions that must be explicitly rejected

    ### 4. AI Agent Augmentation Points
    - What the AI agent observes (inputs / context / data sources)
    - What the AI agent recommends, generates, or automates
    - Prompt template or instruction sketch for the AI agent
    - How the user confirms, overrides, or delegates to the agent
    - Confidence thresholds or guardrails (numeric where possible)
    - Fallback behaviour when the AI agent is unavailable or
      confidence is below threshold
    - Feedback loop — how agent accuracy improves over time

    ### 5. API Contract Sketch
    - Key endpoints (method + path + purpose)
    - Request payload shape with field names, types, and required flags
    - Response payload shape with field names and types
    - Pagination, filtering, and sorting parameters where applicable
    - Authentication / authorization requirements
    - Error codes specific to this feature with HTTP status and message
    - Rate limiting considerations

    ### 6. Acceptance Criteria
    - 3-6 testable acceptance criteria in Given/When/Then format
    - At least one criterion covering AI agent behaviour
    - At least one criterion covering error / edge-case handling
    - At least one criterion covering state transition validation
    - At least one criterion covering data validation rules

    Number features sequentially (Feature 1, Feature 2, …).
    Be specific — use concrete field names, enum values, and endpoint
    paths rather than abstract placeholders.  Every attribute must have
    a concrete type.  Every endpoint must have a concrete path.

    This is iteration {iteration} of {max_iterations}.
    {previous_feedback}
  expected_output: >
    A comprehensive, data-architect-ready requirements breakdown
    document (2000-5000 words) containing multiple numbered features,
    each with the six sections described above.  Use professional
    markdown formatting with clear headings, tables for entity
    attributes, example JSON documents, and state-transition notation.
    Every entity must have fully-typed attributes with validation
    rules.  Every state machine must list all transitions and guards.

evaluate_requirements_task:
  description: >
    Evaluate whether the following product requirements breakdown is
    detailed and granular enough for a data architect to immediately
    start building the data models, state engines, and API layer
    without any follow-up questions.

    ## Requirements Breakdown
    {requirements}

    ## Evaluation Criteria
    Rate each criterion 1-5 (1=absent, 2=vague, 3=adequate,
    4=detailed, 5=implementation-ready):

    1. **Feature completeness** — Are all logical features of the
       product identified?  Are there obvious features missing?
    2. **Entity granularity** — Does every entity list ALL attributes
       with concrete data types (not just "string" but also length
       constraints, enums with values, etc.)?  Are relationships
       specified with foreign key field names?  Are indexes defined?
       Are example documents/records provided?
    3. **State machine rigour** — Does every stateful entity have a
       complete state diagram with ALL transitions, triggers, guards,
       side effects, and explicitly-rejected invalid transitions?
    4. **AI augmentation depth** — Are AI agent inputs, outputs,
       confidence thresholds (numeric), user-override flows, and
       fallback behaviours concrete?  Is there a prompt sketch?
    5. **API contract precision** — Are endpoints fully specified with
       method, path, request/response field names + types, required
       flags, auth requirements, pagination, and error codes with
       HTTP status?
    6. **Acceptance criteria coverage** — Are all criteria in
       Given/When/Then format?  Is there coverage for AI behaviour,
       state transitions, data validation, and error handling?

    ## Granularity Check
    A data architect should be able to:
    - Create every collection/table schema directly from the entities
    - Build a state machine engine from the transition definitions
    - Generate API stubs from the contract sketches
    - Write integration tests from the acceptance criteria

    If ANY of these four are not possible, the breakdown NEEDS_MORE.

    ## Decision Rules
    - All six criteria must score >= 4 for REQUIREMENTS_READY.
    - If any criterion scores <= 2, always return NEEDS_MORE.
    - If this is iteration {iteration} of {max_iterations} and
      iteration >= {min_iterations}, accept scores >= 3 across the
      board as REQUIREMENTS_READY.
    - When returning NEEDS_MORE, list 2-4 **specific, actionable**
      improvements.  Reference exact feature numbers and section
      names (e.g. "Feature 2 → Data Entities: add validation rules
      for email and phone fields").

    End your evaluation with exactly one of:
      REQUIREMENTS_READY — the breakdown is detailed enough.
      NEEDS_MORE         — provide 2-4 specific improvements needed.
  expected_output: >
    A structured evaluation (200-400 words) with a score (1-5) for
    each of the six criteria, a brief justification per score, the
    granularity check result, and then exactly REQUIREMENTS_READY or
    NEEDS_MORE on the final line.  When NEEDS_MORE, the specific
    improvements must immediately precede the verdict.
