"draft_prd_task":
  description: >
    Create a comprehensive Product Requirements Document (PRD) for the
    following feature idea including researching competitors and technical
    standards to ensure the PRD is grounded in industry best practices.
    The idea is provided by the user in the {idea} field.

    The PRD starts with the "Executive Summary". It is iterated between
    the minimum and maximum iteration count before moving to individual
    sections. The Executive Summary is provided in {executive_summary}.

    Write a compelling, detailed executive summary that:
    - Clearly articulates the problem being solved
    - Defines the target audience and key stakeholders
    - Outlines the proposed solution and its key differentiators
    - Highlights expected business impact and success criteria
    - Is consistent with industry best practices for PRD documentation
    - Is written in clear, professional markdown format

    Output ONLY the executive summary content in markdown format.
    Do NOT wrap the output in JSON, code fences, or any document structure.
    Do NOT include metadata fields like run_id, status, timestamps, or
    iteration tracking — the system handles persistence automatically.

  expected_output: >
    A well-written, comprehensive executive summary in clear, professional
    markdown format.

    Output ONLY the executive summary body content — no JSON wrapper, no
    metadata fields, no document structure. The system stores iterations
    and metadata automatically.

  agent: product_manager

critique_prd_task:
  description: >
    Critically review the following PRD executive summary draft and
    identify gaps, weaknesses, and missing elements.
    The critique is provided in the {critique} field.

    Evaluate against the Definition of Done (DoD) checklist:
    1. Is the problem statement clear and concise?
    2. Are all user personas clearly defined with pain points and goals?
    3. Are functional requirements specific and testable?
    4. Are non-functional requirements quantified (performance targets, scale limits)?
    5. Are edge cases and error scenarios addressed comprehensively?
    6. Are analytics/tracking requirements specified with concrete metrics?
    7. Are dependencies and risks documented with mitigations?

    For each gap found, provide a specific, actionable recommendation.
    Rate the PRD readiness on a scale of 1-10.
    If the PRD scores 8 or higher on ALL criteria, mark it as "READY_FOR_DEV".
    Otherwise mark it as "NEEDS_REFINEMENT".

    Use the provided {executive_summary} as the content to evaluate.
    Provide your critique as structured feedback that can be used to
    improve the executive summary in the next iteration.
  expected_output: >
    A structured critique in markdown format containing:
    - Readiness score (1-10) for each DoD criterion
    - Overall status: "READY_FOR_DEV" or "NEEDS_REFINEMENT"
    - List of identified gaps with severity (Critical / Major / Minor)
    - Specific, actionable recommendations for each gap

    Output ONLY the critique content in markdown — no JSON wrapper, no
    metadata fields. The system handles iteration tracking automatically.
  agent: product_manager

# ── Section-level tasks ──────────────────────────────────────
draft_section_task:
  description: >
    You are drafting the **{section_title}** section of a Product Requirements
    Document (PRD) for the following feature idea:

    {idea}

    --- SECTION CONTENT ---
    {section_content}
    --- END OF SECTION CONTENT ---

    The full PRD has these sections (each is indvidual **{section_title}**):
      1. Problem Statement (describing the problem being solved)
      2. User Personas (describing the users of the feature)
      3. Functional Requirements (detailing the specific functionalities needed)
      4. Non-Functional Requirements (describing performance, scalability, security, etc.)
      5. Edge Cases (covering unusual but possible scenarios)
      6. Error Handling (detailing how errors are managed)
      7. Success Metrics (defining how success will be measured)
      8. Dependencies (listing any dependencies on other teams, systems, or technologies)
      9. Assumptions (stating any assumptions made during the planning)

    Write a comprehensive, detailed **{section_title}** section that:
    - Use the latest iterated {executive_summary} as a reference for tone and style.
    - Stays strictly within the scope of this section type — do NOT
      duplicate content that belongs in another section listed above.
    - Is consistent with the other sections provided as context above.
    - Contains specific, actionable content appropriate for this section type.
    - Follows industry best practices for PRD documentation.
    - Is written in clear, professional markdown format.

    Output ONLY the content for the **{section_title}** section.
    Do NOT include the section heading — just the body content.
    Do NOT wrap the output in JSON or any other structure.
  expected_output: >
    A well-written, comprehensive {section_title} section in clear,
    professional markdown format.

    Output ONLY the body content for this section — no section heading,
    no JSON wrapper, no metadata.  The content will be stored by the
    system automatically.
  agent: product_manager

critique_section_task:
  description: >
    Critically review the **{section_title}** section of a PRD.

    Use the executive summary as the authoritative reference for tone,
    scope, and product vision:

    --- EXECUTIVE SUMMARY ---
    {executive_summary}
    --- END OF EXECUTIVE SUMMARY ---

    Here are the other sections already approved for this PRD — use them
    to check cross-section consistency and avoid duplication:

    --- APPROVED SECTIONS ---
    {approved_sections}
    --- END OF APPROVED SECTIONS ---

    Now critically review this section:

    --- CRITIQUE SECTION CONTENT ---
    {critique_section_content}
    --- END OF CRITIQUE SECTION CONTENT ---

    Evaluate the section for:
    1. Completeness — does it cover everything expected for this section type?
    2. Specificity — are requirements concrete and testable?
    3. Consistency — does it align with the executive summary and the other
       approved sections above?
    4. Clarity — is it well-organized and unambiguous?
    5. Actionability — can a development team act on this?
    6. No Duplication — does it avoid repeating content from other sections?

    For each gap, provide a specific, actionable recommendation.
    Rate readiness on a scale of 1-10.
    If the section scores 8 or higher on ALL criteria, mark it as "SECTION_READY".
    Otherwise mark it as "NEEDS_REFINEMENT".
  expected_output: >
    A structured critique containing:
    - Readiness score (1-10) for each criterion
    - Overall status: "SECTION_READY" or "NEEDS_REFINEMENT"
    - List of identified gaps with severity (Critical / Major / Minor)
    - Specific recommendations for each gap
  agent: product_manager

refine_section_task:
  description: >
    Refine the **{section_title}** section of a PRD based on critique section feedback.

    Use the executive summary as the authoritative reference for tone,
    scope, and product vision:

    --- EXECUTIVE SUMMARY ---
    {executive_summary}
    --- END OF EXECUTIVE SUMMARY ---

    Here are the other sections already approved for this PRD — maintain
    consistency with them and avoid duplicating their content:

    --- APPROVED SECTIONS ---
    {approved_sections}
    --- END OF APPROVED SECTIONS ---

    --- CURRENT SECTION CONTENT ---
    {section_content}
    --- END OF SECTION CONTENT---

    --- CRITIQUE SECTION CONTENT ---
    {critique_section_content}
    --- END OF CRITIQUE SECTION CONTENT ---

    Address every gap and recommendation identified in the critique.
    Focus especially on Critical and Major issues first.
    Ensure the refined section is:
    - Consistent with the executive summary and the other approved sections
    - Comprehensive and ready for development handoff
    - Specific and actionable
    - Free of content that belongs in other sections

    Output ONLY the refined content for the **{section_title}** section.
    Do NOT include the section heading — just the body content.
  expected_output: >
    An improved {section_title} section that addresses every gap from
    the critique feedback, in clear professional markdown format.

    Output ONLY the refined body content — no section heading, no JSON
    wrapper, no metadata.  The system stores iterations automatically.
  agent: product_manager
